<!DOCTYPE html>
<html lang="tet">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TimorPM - Project Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        :root { --primary: #0d5c63; --primary-light: #15848f; --accent: #d4af37; --bg: #f3f7f7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); -webkit-user-select: none; user-select: none; }
        .page { display: none; min-height: calc(100vh - 160px); }
        .page.active { display: block; animation: pageFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pageFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }
        #detail-view { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg); z-index: 100; transition: left 0.3s ease-out; overflow-y: auto; }
        #detail-view.open { left: 0; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body class="max-w-md mx-auto relative overflow-x-hidden">
    <header class="sticky top-0 z-40 glass border-b border-teal-100/50 px-6 py-4 flex items-center justify-between">
        <div><h1 class="text-xl font-extrabold text-[#0d5c63] flex items-center gap-2"><span class="w-2 h-6 bg-[#d4af37] rounded-full"></span>TimorPM</h1></div>
        <div class="flex items-center gap-4">
            <button onclick="alert('Notification')" class="relative"><span>🔔</span></button>
            <div class="w-9 h-9 rounded-xl bg-teal-800 border-2 border-teal-100 overflow-hidden"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"></div>
        </div>
    </header>
    <main class="px-6 pt-4 pb-24">
        <div id="page-home" class="page active">
            <div class="mb-6"><p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Welcome back</p><h2 class="text-2xl font-bold text-slate-800">Sr. Administrador</h2></div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-gradient-to-br from-[#0d5c63] to-[#15848f] p-5 rounded-[2rem] text-white shadow-xl"><p class="text-teal-100/70 text-[10px] font-bold uppercase mb-4">Active Projects</p><div class="flex items-end justify-between"><span class="text-4xl font-bold">14</span></div></div>
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm"><p class="text-slate-400 text-[10px] font-bold uppercase mb-4">Budget Used</p><div class="flex items-end justify-between"><span class="text-2xl font-bold text-slate-800">68%</span></div></div>
            </div>
            <h3 class="font-bold text-slate-800 mb-4">Priority Track</h3>
            <div onclick="document.getElementById('detail-view').classList.add('open')" class="bg-white p-5 rounded-3xl border border-slate-50 shadow-sm">
                <div class="flex justify-between items-start mb-4"><div class="flex items-center gap-3"><div class="w-12 h-12 bg-teal-50 rounded-2xl flex items-center justify-center text-2xl">🏗️</div><div><h4 class="font-bold text-slate-800">Port of Tibar</h4><p class="text-[10px] text-slate-400 font-bold uppercase">Logistics Hub</p></div></div></div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div class="bg-teal-600 h-full w-[82%]"></div></div>
            </div>
        </div>
    </main>
    <div id="detail-view">
        <div class="p-6 bg-white min-h-screen">
            <button onclick="document.getElementById('detail-view').classList.remove('open')" class="mb-6 text-2xl">← Back</button>
            <h2 class="text-2xl font-bold mb-4 text-[#0d5c63]">Project Details: Port of Tibar</h2>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl"><p class="font-bold">Status: On Track (82%)</p></div>
                <div class="bg-slate-50 p-4 rounded-2xl"><p class="font-bold">Next Milestone: Equipment Installation</p></div>
            </div>
        </div>
    </div>
    <nav class="fixed bottom-0 left-0 w-full glass border-t border-teal-100/30 flex justify-around items-center px-4 py-3 pb-6">
        <button class="flex flex-col items-center gap-1"><span>🏠</span><span class="text-[9px] font-bold">Home</span></button>
        <button class="flex flex-col items-center gap-1"><span>📂</span><span class="text-[9px] font-bold">Registry</span></button>
        <button class="w-14 h-14 bg-[#0d5c63] rounded-full text-white text-3xl shadow-xl flex items-center justify-center">＋</button>
        <button class="flex flex-col items-center gap-1"><span>📊</span><span class="text-[9px] font-bold">Data</span></button>
        <button class="flex flex-col items-center gap-1"><span>⚙️</span><span class="text-[9px] font-bold">Settings</span></button>
    </nav>
</body>
</html>
